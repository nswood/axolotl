# DeepSeek-R1 Distilled Qwen 7B - Single GPU SFT Configuration
# Full fine-tuning with CPU offload for memory efficiency

base_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
trust_remote_code: true

# Dataset configuration - using local JSONL with conversations format
chat_template: qwen_25
datasets:
  - path: /mnt/beegfs/nwoodward/FT4TP/data/final_synthetic_data/qft_medium_single_step_QFT_prompt/processed_for_rl_conversations/train.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      user:
        - user
      assistant:
        - assistant

# Validation dataset
val_set_size: 0.0
test_datasets:
  - path: /mnt/beegfs/nwoodward/FT4TP/data/final_synthetic_data/qft_medium_single_step_QFT_prompt/processed_for_rl_conversations/val.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      user:
        - user
      assistant:
        - assistant

dataset_prepared_path: last_run_prepared
output_dir: ./outputs/deepseek-r1-qwen-7b-sft

# Sequence length - 20k for long QFT solutions with code
sequence_len: 20000
sample_packing: true
eval_sample_packing: true

# Training hyperparameters
gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5

# Precision settings
bf16: auto
tf32: true

# Memory optimization
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Logging and checkpointing
logging_steps: 1
flash_attention: true
warmup_ratio: 0.1
evals_per_epoch: 4
saves_per_epoch: 1
weight_decay: 0.01

# DeepSpeed ZeRO-3 for single GPU with CPU offload
deepspeed: deepspeed_configs/zero3_bf16.json

# Wandb logging (uncomment and fill in to enable)
# wandb_project: deepseek-r1-qwen-sft
# wandb_entity:
# wandb_name: qft-sft-run

# Special tokens - Qwen2 uses specific tokens
special_tokens:
  pad_token: "<|endoftext|>"
