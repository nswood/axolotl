# DeepSeek-R1 Distilled Qwen 7B - Full SFT Configuration
# Full fine-tuning setup for QFT physics data with code generation

base_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
trust_remote_code: true

# Dataset configuration - using local JSONL with conversations format
chat_template: qwen_25
datasets:
  - path: /mnt/beegfs/nwoodward/FT4TP/data/final_synthetic_data/qft_medium_single_step_QFT_prompt/processed_for_rl_conversations/train.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      user:
        - user
      assistant:
        - assistant

# Validation dataset
val_set_size: 0.0
test_datasets:
  - path: /mnt/beegfs/nwoodward/FT4TP/data/final_synthetic_data/qft_medium_single_step_QFT_prompt/processed_for_rl_conversations/val.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      user:
        - user
      assistant:
        - assistant

dataset_prepared_path: last_run_prepared
output_dir: ./outputs/deepseek-r1-qwen-7b-sft

# Sequence length - 8k is sufficient (max sample ~4k tokens)
sequence_len: 8192
sample_packing: true
eval_sample_packing: true

# Training hyperparameters (4x H200 141GB each)
gradient_accumulation_steps: 2
micro_batch_size: 2
num_epochs: 5
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 5e-6

# Precision settings
bf16: auto
tf32: true

# Memory optimization
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Logging and checkpointing
logging_steps: 1
flash_attention: true
warmup_ratio: 0.1
evals_per_epoch: 4
saves_per_epoch: 4
save_total_limit: 3
save_only_model: true
weight_decay: 0.1

# FSDP configuration for multi-GPU training
fsdp:
  - full_shard
  - auto_wrap
fsdp_config:
  fsdp_limit_all_gathers: true
  fsdp_sync_module_states: true
  fsdp_offload_params: false
  fsdp_use_orig_params: false
  fsdp_cpu_ram_efficient_loading: true
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: Qwen2DecoderLayer
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_sharding_strategy: FULL_SHARD

# Wandb logging
wandb_project: deepseek-r1-qwen-sft
wandb_name: qft-sft-run

# Special tokens - Qwen2 uses specific tokens
special_tokens:
  pad_token: "<|endoftext|>"
